<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema POS — Página Web Otanche</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-bg">
    <div class="login-orb orb1"></div>
    <div class="login-orb orb2"></div>
    <div class="login-orb orb3"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" id="loginLogo">
        <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="url(#lg)"/><path d="M10 28V18l10-8 10 8v10H24v-6h-8v6z" fill="white" opacity=".9"/><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#10b981"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient></defs></svg>
      </div>
      <div class="login-brand">
        <span class="login-brand-name" id="loginBusinessName">Página Web Otanche</span>
        <span class="login-brand-sub">Sistema de Control de Ventas</span>
      </div>
    </div>
    <h2 class="login-title">Iniciar Sesión</h2>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-password-wrap">
        <input type="password" id="loginPass" placeholder="Ingresa tu contraseña" autocomplete="current-password">
        <button class="toggle-pass" onclick="togglePassword('loginPass',this)" tabindex="-1">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div id="loginError" class="login-error hidden"></div>
    <button class="btn-login" onclick="doLogin()">Entrar al Sistema</button>
    <p class="login-footer">Acceso restringido al personal autorizado</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo" id="sidebarLogo">
        <div class="logo-icon small">
          <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="url(#lg2)"/><path d="M10 28V18l10-8 10 8v10H24v-6h-8v6z" fill="white" opacity=".9"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#10b981"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient></defs></svg>
        </div>
        <span class="sidebar-brand" id="sidebarBusinessName">Otanche POS</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item active" data-module="dashboard" onclick="showModule('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" data-module="ventas" onclick="showModule('ventas')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Ventas / POS</span>
      </a>
      <a class="nav-item" data-module="apartados" onclick="showModule('apartados')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Apartados</span>
      </a>
      <a class="nav-item" data-module="caja" onclick="showModule('caja')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>Caja</span>
      </a>

      <div class="nav-section-label">Inventario</div>
      <a class="nav-item" data-module="productos" onclick="showModule('productos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Productos</span>
      </a>
      <a class="nav-item" data-module="ofertas" onclick="showModule('ofertas')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Ofertas</span>
      </a>
      <a class="nav-item" data-module="cupones" onclick="showModule('cupones')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Cupones</span>
      </a>

      <div class="nav-section-label">Gestión</div>
      <a class="nav-item" data-module="movimientos" onclick="showModule('movimientos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span>Movimientos</span>
      </a>
      <a class="nav-item" data-module="reportes" onclick="showModule('reportes')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Reportes</span>
      </a>
      <a class="nav-item" data-module="usuarios" id="navUsuarios" onclick="showModule('usuarios')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Usuarios</span>
      </a>
      <a class="nav-item" data-module="configuracion" id="navConfig" onclick="showModule('configuracion')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Configuración</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <span>Modo Claro</span>
      </button>
      <div class="sidebar-user" id="sidebarUser">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <span class="user-name" id="userNameDisplay">Admin</span>
          <span class="user-role" id="userRoleDisplay">Administrador</span>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent">
    <div id="moduleContainer"></div>
  </main>
</div>

<!-- MODAL CONTAINER -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container"></div>

<!-- PRINT AREA -->
<div id="printArea" class="print-only"></div>

<script src="js/app.js"></script>
<script src="js/ui.js"></script>
<script src="js/permisos.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/productos.js"></script>
<script src="js/ventas.js"></script>
<script src="js/caja.js"></script>
<script src="js/apartados.js"></script>
<script src="js/movimientos.js"></script>
<script src="js/reportes.js"></script>
<script src="js/excel.js"></script>
<script src="js/configuracion.js"></script>
<script src="js/cupones.js"></script>
</body>
</html>
